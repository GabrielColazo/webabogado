<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Turnos | Dr. Martínez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0B1622;
            color: #F5F0E8;
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
        }

        /* LOGIN */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: #1A2B3C;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .login-titulo {
            font-family: 'Playfair Display', serif;
            color: #C9A84C;
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
        }

        .login-subtitulo {
            color: #B0B8C1;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .admin-input {
            width: 100%;
            background: #0B1622;
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: #F5F0E8;
            padding: 10px 14px;
            border-radius: 4px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .admin-input:focus {
            outline: none;
            border-color: #C9A84C;
        }

        .btn-dorado {
            background: #C9A84C;
            color: #0B1622;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn-dorado:hover {
            background: #E8C96A;
        }

        .login-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        /* PANEL */
        .panel-wrapper {
            display: none;
            min-height: 100vh;
        }

        .panel-header {
            background: #1A2B3C;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-logo {
            font-family: 'Playfair Display', serif;
            color: #C9A84C;
            font-size: 1.2rem;
        }

        .panel-user {
            color: #B0B8C1;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-logout {
            background: none;
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: #C9A84C;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(201, 168, 76, 0.1);
        }

        .panel-body {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .panel-titulo {
            font-family: 'Playfair Display', serif;
            color: #C9A84C;
            font-size: 1.4rem;
            margin-bottom: 0.25rem;
        }

        .panel-subtitulo {
            color: #B0B8C1;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1A2B3C;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #B0B8C1;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .stat-numero {
            font-size: 1.8rem;
            font-weight: 600;
            color: #C9A84C;
        }

        /* FILTROS */
        .filtros {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filtro-input {
            background: #1A2B3C;
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: #F5F0E8;
            padding: 8px 14px;
            border-radius: 4px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.85rem;
        }

        .filtro-input:focus {
            outline: none;
            border-color: #C9A84C;
        }

        /* TABLA */
        .tabla-wrapper {
            background: #1A2B3C;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .tabla-turnos {
            width: 100%;
            border-collapse: collapse;
        }

        .tabla-turnos th {
            background: rgba(201, 168, 76, 0.1);
            color: #C9A84C;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
        }

        .tabla-turnos td {
            padding: 12px 16px;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #F5F0E8;
        }

        .tabla-turnos tr:hover td {
            background: rgba(201, 168, 76, 0.05);
        }

        .badge-estado {
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-reservado {
            background: rgba(201, 168, 76, 0.15);
            color: #C9A84C;
        }

        .badge-atendido {
            background: rgba(125, 206, 160, 0.15);
            color: #7dcea0;
        }

        .badge-cancelado {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .btn-accion {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-atendido {
            color: #7dcea0;
        }

        .btn-atendido:hover {
            background: rgba(125, 206, 160, 0.1);
        }

        .btn-cancelar {
            color: #e74c3c;
        }

        .btn-cancelar:hover {
            background: rgba(231, 76, 60, 0.1);
        }

        .sin-turnos {
            text-align: center;
            padding: 3rem;
            color: #B0B8C1;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div class="login-wrapper" id="login-wrapper">
        <div class="login-card">
            <h1 class="login-titulo">Panel de administración</h1>
            <p class="login-subtitulo">Dr. Martínez — Estudio Jurídico Penal</p>
            <p class="login-error" id="login-error">Email o contraseña incorrectos.</p>
            <input type="email" class="admin-input" id="inp-email" placeholder="Email" />
            <input type="password" class="admin-input" id="inp-password" placeholder="Contraseña" />
            <button class="btn-dorado" id="btn-login">Ingresar</button>
        </div>
    </div>

    <!-- PANEL -->
    <div class="panel-wrapper" id="panel-wrapper">
        <div class="panel-header">
            <span class="panel-logo"><i class="bi bi-bank"></i> Dr. Martínez</span>
            <div class="panel-user">
                <span id="usuario-email"></span>
                <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
            </div>
        </div>

        <div class="panel-body">
            <h2 class="panel-titulo">Turnos reservados</h2>
            <p class="panel-subtitulo" id="panel-fecha-hoy"></p>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Total turnos</p>
                    <p class="stat-numero" id="stat-total">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Hoy</p>
                    <p class="stat-numero" id="stat-hoy">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Pendientes</p>
                    <p class="stat-numero" id="stat-pendientes">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Atendidos</p>
                    <p class="stat-numero" id="stat-atendidos">0</p>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filtros">
                <input type="date" class="filtro-input" id="filtro-fecha" />
                <select class="filtro-input" id="filtro-estado">
                    <option value="">Todos los estados</option>
                    <option value="reservado">Reservado</option>
                    <option value="atendido">Atendido</option>
                    <option value="cancelado">Cancelado</option>
                </select>
                <button class="btn-dorado" style="width:auto; padding: 8px 20px;"
                    onclick="limpiarFiltros()">Limpiar</button>
            </div>

            <!-- Tabla -->
            <div class="tabla-wrapper">
                <table class="tabla-turnos">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        <tr>
                            <td colspan="7" class="sin-turnos">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://aajhbbzhwsganqzgcwqk.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_mnOmY-iWZmMtkeV32VDpVg_kFO7lBhK'
        const { createClient } = supabase
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

        const MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre']
        let todosTurnos = []

        // Verificar sesión al cargar
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) mostrarPanel(session.user.email)
        })

        // Login
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('inp-email').value.trim()
            const password = document.getElementById('inp-password').value.trim()
            const { data, error } = await sb.auth.signInWithPassword({ email, password })
            if (error) {
                document.getElementById('login-error').style.display = 'block'
                return
            }
            mostrarPanel(data.user.email)
        })

        // Logout
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await sb.auth.signOut()
            document.getElementById('panel-wrapper').style.display = 'none'
            document.getElementById('login-wrapper').style.display = 'flex'
        })

        // Filtros
        document.getElementById('filtro-fecha').addEventListener('change', filtrar)
        document.getElementById('filtro-estado').addEventListener('change', filtrar)

        function limpiarFiltros() {
            document.getElementById('filtro-fecha').value = ''
            document.getElementById('filtro-estado').value = ''
            renderTabla(todosTurnos)
        }

        function filtrar() {
            const fecha = document.getElementById('filtro-fecha').value
            const estado = document.getElementById('filtro-estado').value
            let filtrados = todosTurnos
            if (fecha) filtrados = filtrados.filter(t => t.fecha === fecha)
            if (estado) filtrados = filtrados.filter(t => t.estado === estado)
            renderTabla(filtrados)
        }

        async function mostrarPanel(email) {
            document.getElementById('login-wrapper').style.display = 'none'
            document.getElementById('panel-wrapper').style.display = 'block'
            document.getElementById('usuario-email').textContent = email
            const hoy = new Date()
            document.getElementById('panel-fecha-hoy').textContent = hoy.getDate() + ' de ' + MESES[hoy.getMonth()] + ' de ' + hoy.getFullYear()
            await cargarTurnos()
        }

        async function cargarTurnos() {
            const { data, error } = await sb.from('turnos').select('*').order('fecha').order('hora')
            if (error) { console.error(error); return }
            todosTurnos = data
            actualizarStats(data)
            renderTabla(data)
        }

        function actualizarStats(data) {
            const hoy = new Date().toISOString().split('T')[0]
            document.getElementById('stat-total').textContent = data.length
            document.getElementById('stat-hoy').textContent = data.filter(t => t.fecha === hoy).length
            document.getElementById('stat-pendientes').textContent = data.filter(t => t.estado === 'reservado').length
            document.getElementById('stat-atendidos').textContent = data.filter(t => t.estado === 'atendido').length
        }

        function renderTabla(data) {
            const tbody = document.getElementById('tabla-body')
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="sin-turnos">No hay turnos para mostrar.</td></tr>'
                return
            }
            tbody.innerHTML = data.map(t => `
        <tr>
          <td>${formatFecha(t.fecha)}</td>
          <td>${t.hora}</td>
          <td>${t.nombre}</td>
          <td>${t.dni}</td>
          <td>${t.telefono}</td>
          <td><span class="badge-estado badge-${t.estado}">${t.estado}</span></td>
          <td>
            ${t.estado === 'reservado' ? `<button class="btn-accion btn-atendido" onclick="cambiarEstado(${t.id}, 'atendido')"><i class="bi bi-check-circle"></i> Atendido</button>` : ''}
            ${t.estado !== 'cancelado' ? `<button class="btn-accion btn-cancelar" onclick="cambiarEstado(${t.id}, 'cancelado')"><i class="bi bi-x-circle"></i> Cancelar</button>` : ''}
          </td>
        </tr>
      `).join('')
        }

        async function cambiarEstado(id, estado) {
            await sb.from('turnos').update({ estado }).eq('id', id)
            await cargarTurnos()
        }

        function formatFecha(fecha) {
            const [y, m, d] = fecha.split('-')
            return `${parseInt(d)} ${MESES[parseInt(m) - 1]} ${y}`
        }
    </script>

</body>

</html>
